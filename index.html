<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 1: The Heart of a Champion | 進階語音評量</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --primary-navy: #0f172a;
            --accent-gold: #d4af37;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }
        
        .academic-header {
            background: linear-gradient(135deg, var(--primary-navy) 0%, #1e293b 100%);
        }

        .english-quote {
            font-family: 'Libre Baskerville', serif;
            line-height: 1.8;
            word-spacing: 0.1em;
        }

        .word-span {
            display: inline-block;
            margin: 1px 2px;
            padding: 1px 4px;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        @media (min-width: 768px) {
            .word-span { font-size: 1.75rem; }
        }

        .word-matched {
            color: #059669;
            background-color: #ecfdf5;
            font-weight: 700;
        }

        .word-pending {
            color: #64748b;
        }

        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
        }

        .btn-gold {
            background: var(--accent-gold);
            color: white;
        }

        .recording-active {
            animation: pulse-red 1.5s infinite;
            background-color: #ef4444 !important;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .quiz-item {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 2rem;
        }
        .quiz-item:last-child {
            border-bottom: none;
        }
        .quiz-option {
            width: 100%;
            text-align: left;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 2px solid #f1f5f9;
            background: white;
            transition: all 0.2s;
            font-size: 0.95rem;
            line-height: 1.4;
            display: block;
            margin-bottom: 0.5rem;
        }
        .quiz-option:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="academic-header text-white py-4 px-4 shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap text-xl text-[#d4af37]"></i>
                <span class="font-bold tracking-wider text-sm">L1 REVIEW</span>
            </div>
            <div id="status-display" class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full border border-white/20">
                <div class="w-2 h-2 rounded-full bg-slate-400" id="status-dot"></div>
                <span class="text-[10px] font-bold uppercase" id="status-text">Standby</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6">
        
        <!-- 01. 朗讀測驗 -->
        <section class="glass-card rounded-3xl p-6 shadow-sm mb-6 border-b-4 border-b-[#d4af37]">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <span class="w-7 h-7 bg-slate-100 rounded-lg flex items-center justify-center text-xs">01</span>
                    Oral Reading Task
                </h2>
                <button id="play-pause-btn" onclick="toggleDemo()" class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-xl text-blue-600 font-bold text-xs">
                    <i class="fa-solid fa-play" id="audio-icon"></i>
                    <span id="audio-label">聽示範</span>
                </button>
            </div>

            <div class="bg-slate-50 rounded-2xl p-5 md:p-8 border border-slate-100 mb-6">
                <div id="word-container" class="english-quote text-left text-slate-700">
                    <!-- Words injected here -->
                </div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <div id="mic-error-msg" class="hidden text-xs text-red-500 font-bold bg-red-50 p-3 rounded-xl text-center w-full">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i> 請檢查麥克風權限 (需 HTTPS 且點擊允許)
                </div>
                <button id="record-ctrl-btn" onclick="toggleTest()" class="btn-gold w-full md:w-auto px-8 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-md active:scale-95 transition-all">
                    <i class="fa-solid fa-microphone" id="btn-icon"></i>
                    <span id="btn-text">開始語音辨識</span>
                </button>
                <div id="live-transcript" class="text-slate-400 text-xs italic font-medium h-4 overflow-hidden text-center w-full"></div>
            </div>
        </section>

        <!-- 分析報告 -->
        <div id="score-report-container">
            <section id="score-report" class="hidden glass-card rounded-3xl p-6 shadow-md border-l-8 border-l-blue-600 mb-6 animate-in slide-in-from-bottom duration-500">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">口說分析報告</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                    <div class="text-center relative py-2">
                        <svg class="w-28 h-28 mx-auto transform -rotate-90" viewBox="0 0 36 36">
                            <circle cx="18" cy="18" r="16" fill="none" class="stroke-slate-100" stroke-width="3"></circle>
                            <circle id="progress-circle" cx="18" cy="18" r="16" fill="none" class="stroke-blue-600 transition-all duration-1000" stroke-width="3" stroke-dasharray="0, 100" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                            <div class="text-2xl font-black text-slate-800" id="final-score">0%</div>
                            <div class="text-[8px] font-bold text-slate-400 uppercase">Success</div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100 flex justify-between items-center">
                            <span class="text-[10px] font-bold text-emerald-600 uppercase">Fluency 流暢度</span>
                            <span id="fluency-val" class="font-black text-emerald-800 italic">0%</span>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 flex justify-between items-center">
                            <span class="text-[10px] font-bold text-blue-600 uppercase">Accuracy 準確度</span>
                            <span id="precision-val" class="font-black text-blue-800 italic">0%</span>
                        </div>
                    </div>
                    <div class="p-4 bg-slate-900 rounded-2xl text-white h-full">
                        <h4 class="text-[10px] font-bold text-[#d4af37] uppercase mb-2">AI Feedback</h4>
                        <ul id="feedback-list" class="text-[11px] space-y-1 opacity-90 leading-relaxed list-disc pl-3">
                        </ul>
                    </div>
                </div>
            </section>
        </div>

        <!-- 02. 文學理解挑戰 (恢復正確題目版) -->
        <section class="glass-card rounded-3xl p-6 shadow-md">
            <div class="mb-8">
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2 mb-1">
                    <span class="w-7 h-7 bg-slate-100 rounded-lg flex items-center justify-center text-xs">02</span>
                    Reading Comprehension
                </h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider ml-9 italic">請根據課文細節選擇最正確的選項</p>
            </div>
            
            <div class="space-y-10" id="quiz-stack">
                <!-- 題目由 JS 動態生成 -->
            </div>
        </section>
    </main>

    <script>
        const targetText = "Suddenly, he feels a sharp pain in his leg. The pain is unbearable, and he grabs his powerless limb in horror. Immediately, he realizes what has happened: his right hamstring is completely torn. All eyes in the crowd are on him, watching him collapse to the ground in pain.";
        const words = targetText.split(/\s+/);
        
        // --- 朗讀區初始化 ---
        const wordContainer = document.getElementById('word-container');
        words.forEach((w, i) => {
            const span = document.createElement('span');
            span.textContent = w;
            span.id = `word-${i}`;
            span.className = "word-span word-pending";
            wordContainer.appendChild(span);
        });

        // --- TTS & STT 邏輯 (保持原有優化功能) ---
        let speechSynth = window.speechSynthesis;
        let utterance = new SpeechSynthesisUtterance(targetText);
        let isAudioPlaying = false;
        utterance.rate = 0.8;

        function toggleDemo() {
            if (isAudioPlaying) {
                speechSynth.pause();
                isAudioPlaying = false;
                document.getElementById('audio-icon').className = "fa-solid fa-play";
            } else {
                if (speechSynth.paused) speechSynth.resume();
                else speechSynth.speak(utterance);
                isAudioPlaying = true;
                document.getElementById('audio-icon').className = "fa-solid fa-pause";
            }
        }
        utterance.onend = () => {
            isAudioPlaying = false;
            document.getElementById('audio-icon').className = "fa-solid fa-play";
        };

        let recognition;
        let isRecording = false;
        let matchedIndices = new Set();
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }
                document.getElementById('live-transcript').textContent = interimTranscript || finalTranscript;
                processVoice(finalTranscript + interimTranscript);
            };
            recognition.onerror = () => stopExam();
        }

        async function startExam() {
            if (!recognition) return alert("瀏覽器不支援。");
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                matchedIndices.clear();
                words.forEach((_, i) => document.getElementById(`word-${i}`).className = "word-span word-pending");
                document.getElementById('score-report').classList.add('hidden');
                recognition.start();
                isRecording = true;
                updateUI(true);
            } catch (err) {
                document.getElementById('mic-error-msg').classList.remove('hidden');
            }
        }

        function stopExam() {
            if (recognition) recognition.stop();
            isRecording = false;
            updateUI(false);
            if (matchedIndices.size > 0) generateReport();
        }

        function toggleTest() { isRecording ? stopExam() : startExam(); }

        function updateUI(active) {
            const btn = document.getElementById('record-ctrl-btn');
            const icon = document.getElementById('btn-icon');
            const text = document.getElementById('btn-text');
            const dot = document.getElementById('status-dot');

            if (active) {
                btn.className = "bg-red-500 text-white w-full md:w-auto px-10 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-md recording-active";
                icon.className = "fa-solid fa-square";
                text.textContent = "停止辨識";
                dot.className = "w-2 h-2 rounded-full bg-red-500";
            } else {
                btn.className = "btn-gold w-full md:w-auto px-10 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-md";
                icon.className = "fa-solid fa-microphone";
                text.textContent = matchedIndices.size > 0 ? "重新測驗" : "開始語音辨識";
                dot.className = "w-2 h-2 rounded-full bg-emerald-500";
            }
        }

        function processVoice(input) {
            const spoken = input.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
            const targetClean = targetText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
            targetClean.forEach((target, i) => {
                if (spoken.includes(target)) {
                    document.getElementById(`word-${i}`).className = "word-span word-matched";
                    matchedIndices.add(i);
                }
            });
        }

        function generateReport() {
            const accuracy = Math.round((matchedIndices.size / words.length) * 100);
            document.getElementById('score-report').classList.remove('hidden');
            animateValue('final-score', 0, accuracy, 1000, '%');
            setTimeout(() => {
                document.getElementById('fluency-val').textContent = Math.min(100, accuracy + 5) + '%';
                document.getElementById('precision-val').textContent = accuracy + '%';
                document.getElementById('progress-circle').setAttribute('stroke-dasharray', `${accuracy}, 100`);
                const feedbackList = document.getElementById('feedback-list');
                feedbackList.innerHTML = accuracy > 70 ? 
                    "<li>語調穩定，單字清晰</li><li>嘗試增加連音的流暢度</li>" : 
                    "<li>錄音不完全或發音不準</li><li>建議點擊'聽示範'再試一次</li>";
            }, 500);
            document.getElementById('score-report').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function animateValue(id, start, end, duration, suffix = '') {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerText = Math.floor(progress * (end - start) + start) + suffix;
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // --- 恢復原有的複雜閱讀測驗題目 ---
        const quizData = [
            { 
                q: "The author uses short fragments like 'One hundred meters. ... One hundred and fifty meters.' What is the primary purpose?", 
                options: [
                    "To save space and make the story shorter.",
                    "To create suspense and mimic the rhythm of the race.",
                    "To show Derek was moving slowly at the beginning.",
                    "To focus on distance rather than Derek's emotions."
                ], 
                ans: 1 
            },
            { 
                q: "What does the repetition of 'Somehow' emphasize in the text?", 
                options: [
                    "The physical technique Derek used.",
                    "The doubt the author had about Derek.",
                    "The mysterious and incredible nature of determination.",
                    "The fact that Derek was lost on the track."
                ], 
                ans: 2 
            },
            { 
                q: "What does the 'Heart of a Champion' refer to at the end of the text?", 
                options: [
                    "Physical health of an athlete's heart.",
                    "Winning a gold medal regardless of the cost.",
                    "The speed of recovery from injury.",
                    "Inner strength to finish despite failure or pain."
                ], 
                ans: 3 
            },
            { 
                q: "In the later part of the story, Derek's father joined him. What did this represent?", 
                options: [
                    "The father's disappointment in Derek's injury.",
                    "Unconditional support and the spirit of 'finishing together'.",
                    "An attempt to force Derek to stop running immediately.",
                    "A rule violation that Derek didn't want."
                ], 
                ans: 1 
            }
        ];

        const quizStack = document.getElementById('quiz-stack');
        quizData.forEach((item, qIdx) => {
            const div = document.createElement('div');
            div.className = "quiz-item";
            div.innerHTML = `
                <div class="flex gap-3 items-start mb-4">
                    <span class="bg-indigo-600 text-white font-bold px-2 py-1 rounded text-[10px] mt-1 shrink-0">Q${qIdx+1}</span>
                    <p class="font-bold text-slate-800 text-base leading-snug">${item.q}</p>
                </div>
                <div class="grid grid-cols-1 gap-1 pl-9">
                    ${item.options.map((opt, oIdx) => `
                        <button onclick="checkAnswer(this, ${oIdx === item.ans})" class="quiz-option">
                            <span class="inline-block w-6 text-slate-400 font-mono">${String.fromCharCode(65+oIdx)}.</span>
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
            quizStack.appendChild(div);
        });

        function checkAnswer(btn, isCorrect) {
            const container = btn.parentElement;
            container.querySelectorAll('button').forEach(b => {
                b.disabled = true;
                b.classList.add('opacity-40');
            });
            btn.classList.remove('opacity-40');
            if (isCorrect) {
                btn.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700', 'font-bold');
                btn.innerHTML += ' <i class="fa-solid fa-circle-check float-right mt-1"></i>';
            } else {
                btn.classList.add('border-red-400', 'bg-red-50', 'text-red-700', 'font-bold');
                btn.innerHTML += ' <i class="fa-solid fa-circle-xmark float-right mt-1"></i>';
            }
        }
    </script>
</body>
</html>
