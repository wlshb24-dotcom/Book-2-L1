<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In-Flight Menu Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 10px; margin: 0; }
        .container { width: 100%; box-sizing: border-box; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0056b3; font-size: 1.5em; margin-top: 5px; }
        .role-section { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .role-title { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; color: #2c3e50; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        select, textarea, input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; font-size: 1em; }
        textarea { height: 120px; resize: vertical; }
        
        .button-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .starter-btn { background: #0056b3; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.95em; text-align: left; }
        .generate-btn { display: block; width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 6px rgba(40,167,69,0.3); }
        .download-btn { display: none; width: 100%; padding: 15px; background: #17a2b8; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .toolbar { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #ddd;}
        canvas { border: 2px solid #bbb; background: #fff; cursor: crosshair; border-radius: 5px; width: 100%; aspect-ratio: 4/3; display: block; touch-action: none; box-sizing: border-box; }
        .clear-btn { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 0.9em; cursor: pointer;}

        #menu-output-container { margin-top: 30px; display: none; }
        #menu-output { padding: 20px; border-radius: 12px; text-align: center; }
        .theme-luxury { background: #1a1a1a; color: #f4d03f; font-family: 'Georgia', serif; border: 3px solid #d4af37; }
        .theme-eco { background: #e8f5e9; color: #2e7d32; font-family: 'Arial', sans-serif; border: 3px solid #81c784; }
        
        .output-title { font-size: 1.8em; margin-bottom: 20px; border-bottom: 2px solid currentColor; padding-bottom: 10px; display: inline-block; }
        .menu-content { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #output-dish-name { margin: 0 0 10px 0; font-size: 1.4em; font-style: italic; }
        #output-image { width: 100%; max-width: 400px; border-radius: 8px; background: white; border: 2px solid currentColor; }
        .output-text { font-size: 1.05em; line-height: 1.5; text-align: left; padding: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 8px; width: 100%; box-sizing: border-box; }
        .output-features { display: flex; flex-direction: column; gap: 10px; font-style: italic; font-size: 0.9em; margin-top: 15px; padding-top: 15px; border-top: 1px dashed currentColor; }
    </style>
</head>
<body onload="applyTemplate()">

<div class="container">
    <h1>✈️ In-Flight Menu Builder</h1>

    <div class="role-section">
        <div class="role-title">🔬 The Scientist: Identify the Problem</div>
        <select id="problem">
            <option value="Dry Cabin Air">Dry Cabin Air (Low humidity)</option>
            <option value="Blocked Senses">Blocked Senses (Stuffy noses)</option>
            <option value="Engine Distraction">Engine Distraction (Constant noise)</option>
        </select>
    </div>

    <div class="role-section">
        <div class="role-title">🧑‍🍳 The Head Chef: Choose the Solution</div>
        <select id="solution">
            <option value="Umami Boost">Umami Boost (Tomatoes & mushrooms)</option>
            <option value="Texture Control">Texture Control (Medium-rare prep)</option>
            <option value="Sensory Clearing">Sensory Clearing (Nasal sprays)</option>
        </select>
    </div>

    <div class="role-section">
        <div class="role-title">📝 The Copy Editor: Draft Text</div>
        <div class="button-group">
            <button class="starter-btn" onclick="insertText('To combat the dulling effects of ')">Start: "To combat..."</button>
            <button class="starter-btn" onclick="insertText('Given that the cabin unique environment compromises ')">Start: "Given that..."</button>
            <button class="starter-btn" onclick="insertText('Our culinary team counteracts this phenomenon by ')">Solution: "Our team..."</button>
        </div>
        <textarea id="promo-text" placeholder="Combine the Scientist's and Chef's ideas here... (50-80 words)"></textarea>
        <div id="word-count" style="font-size: 0.85em; text-align: right; color: #555;">Word Count: 0</div>
    </div>

    <div class="role-section">
        <div class="role-title">🎨 The Art Director: Design & Draw</div>
        <select id="theme" style="margin-bottom: 15px;">
            <option value="theme-luxury">Menu Theme: Luxury First Class</option>
            <option value="theme-eco">Menu Theme: Modern Eco</option>
        </select>

        <label>Name Your Signature Dish:</label>
        <input type="text" id="dish-name" placeholder="e.g., High-Altitude Mushroom Steak">
        
        <label>Canvas Background Template:</label>
        <select id="canvas-template" onchange="applyTemplate()">
            <option value="blank">Blank White Canvas</option>
            <option value="first-class">First Class Ceramic Plate</option>
            <option value="eco-tray">Economy Meal Tray</option>
        </select>

        <label>Or Upload/Take a Photo to Draw Over:</label>
        <input type="file" id="image-upload" accept="image/*" capture="environment">

        <label style="margin-top: 10px;">Draw the Food:</label>
        <div class="toolbar">
            <div>
                <input type="color" id="brush-color" value="#000000">
                <input type="range" id="brush-size" min="1" max="20" value="4">
            </div>
            <button class="clear-btn" onclick="applyTemplate()">🗑️ Clear</button>
        </div>
        <canvas id="drawing-board" width="600" height="450"></canvas>
    </div>

    <button class="generate-btn" onclick="generateMenu()">✨ Generate Menu</button>

    <div id="menu-output-container">
        <div id="menu-output">
            <div class="output-title">Sky-High Dining</div>
            <div class="menu-content">
                <h3 id="output-dish-name"></h3>
                <img id="output-image" alt="Signature Dish">
                <div class="output-text" id="output-promo"></div>
            </div>
            <div class="output-features">
                <span id="output-prob-badge"></span>
                <span id="output-sol-badge"></span>
            </div>
        </div>
        <button id="download-btn" class="download-btn" onclick="downloadImage()">📸 Download Menu for Google Classroom</button>
    </div>

</div>

<script>
    document.getElementById('promo-text').addEventListener('input', function() {
        let text = this.value.trim();
        let words = text === "" ? 0 : text.split(/\s+/).length;
        let counter = document.getElementById('word-count');
        counter.textContent = "Word Count: " + words;
        counter.style.color = (words < 50 || words > 80) ? "red" : "green";
    });

    function insertText(text) {
        let textarea = document.getElementById('promo-text');
        textarea.value += text;
        textarea.focus();
        textarea.dispatchEvent(new Event('input')); 
    }

    const canvas = document.getElementById('drawing-board');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Apply specific backgrounds
    function applyTemplate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let template = document.getElementById('canvas-template').value;
        
        if (template === 'blank') {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (template === 'first-class') {
            ctx.fillStyle = "#2c3e50"; // Dark table
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.height/2.2, 0, 2 * Math.PI);
            ctx.fillStyle = "#f5f5f5"; // White plate
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#d4af37"; // Gold rim
            ctx.stroke();
            ctx.beginPath(); // reset path for drawing
        } else if (template === 'eco-tray') {
            ctx.fillStyle = "#bbdefb"; // Light blue tray table
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#eeeeee"; // Grey tray
            let padding = 30;
            ctx.fillRect(padding, padding, canvas.width - (padding*2), canvas.height - (padding*2));
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#9e9e9e";
            ctx.strokeRect(padding, padding, canvas.width - (padding*2), canvas.height - (padding*2));
            ctx.beginPath();
        }
    }

    // Image Upload Handling
    document.getElementById('image-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Drawing mechanics
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function startPosition(e) {
        isDrawing = true;
        draw(e);
    }

    function endPosition() {
        isDrawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault(); 
        
        ctx.lineWidth = document.getElementById('brush-size').value;
        ctx.lineCap = 'round';
        ctx.strokeStyle = document.getElementById('brush-color').value;

        const pos = getMousePos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseout', endPosition);
    canvas.addEventListener('touchstart', startPosition, { passive: false });
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', draw, { passive: false });

    // Output Generation
    function generateMenu() {
        document.getElementById('output-image').src = canvas.toDataURL("image/png");
        document.getElementById('output-dish-name').innerText = document.getElementById('dish-name').value || "Chef's Special";
        document.getElementById('output-promo').innerText = document.getElementById('promo-text').value;
        document.getElementById('output-prob-badge').innerText = "🔬 Tackling: " + document.getElementById('problem').options[document.getElementById('problem').selectedIndex].text;
        document.getElementById('output-sol-badge').innerText = "🧑‍🍳 Featuring: " + document.getElementById('solution').options[document.getElementById('solution').selectedIndex].text;

        let outputContainer = document.getElementById('menu-output-container');
        let outputDiv = document.getElementById('menu-output');
        
        outputDiv.className = document.getElementById('theme').value;
        outputContainer.style.display = "block";
        document.getElementById('download-btn').style.display = "block"; 
        
        outputContainer.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadImage() {
        const menuElement = document.getElementById('menu-output');
        html2canvas(menuElement, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Our-In-Flight-Menu.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>

</body>
</html>
